<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voto San Jorge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#E24B4A;--blue:#378ADD;--gold:#D4A017;--bg:#070709;--card:#111115;--border:#1e1e24;--muted:#555}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0;overflow-x:hidden}

/* ── HEADER ── */
.top-bar{
  width:100%;display:flex;flex-direction:column;align-items:center;
  padding:18px 20px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 100%);
  position:relative;
}
.logos-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logos-row img{height:32px;object-fit:contain}
.logos-row .div{width:1px;height:26px;background:rgba(255,255,255,.12)}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:5px;color:#fff}
.brand-name span{color:var(--gold)}
.phase-pill{
  display:inline-block;padding:3px 14px;border-radius:20px;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);
  margin-top:2px;
}

/* ── MAIN ── */
.main{width:100%;max-width:420px;padding:16px 16px 24px;flex:1;display:flex;flex-direction:column;gap:12px}

/* ── TIMER ── */
.timer-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 16px;
}
.timer-num{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
.timer-lbl{font-size:11px;letter-spacing:3px;color:var(--muted)}
.timer-bar.urgent{background:rgba(226,75,74,.12);border-color:rgba(226,75,74,.3)}
.timer-bar.urgent .timer-num{color:var(--red);animation:pulse 1s infinite}

/* ── CARDS ── */
.battle-card{
  position:relative;overflow:hidden;border-radius:18px;padding:20px 18px;
  background:var(--card);border:2px solid var(--border);
  cursor:pointer;transition:transform .12s,border-color .2s,box-shadow .2s;
  -webkit-user-select:none;user-select:none;
}
.battle-card:active:not(.disabled):not(.dimmed){transform:scale(.97)}
.battle-card.voted-card{border-color:var(--sel-color);box-shadow:0 0 24px rgba(var(--sel-rgb),.18)}
.battle-card.voted-card::before{content:'';position:absolute;inset:0;background:var(--sel-color);opacity:.07}
.battle-card.dimmed{opacity:.28;pointer-events:none}
.battle-card.disabled{cursor:default;opacity:.45}
.mc-name{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;line-height:1}
.mc-name.r{color:var(--red)}
.mc-name.b{color:var(--blue)}
.mc-meta{font-size:12px;color:var(--muted);margin-top:6px}
.check-badge{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
}

/* ── VS ── */
.vs-row{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:6px;color:#222;margin:-2px 0}

/* ── BAR ── */
.bar-wrap{height:8px;border-radius:4px;display:flex;overflow:hidden;background:#1a1a1a;gap:2px}
.bar-wrap div{transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── MESSAGE ── */
.msg-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;text-align:center;
}
.msg-card h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:#fff}
.msg-card p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}
.msg-icon{font-size:28px;margin-top:10px}

/* ── RESULTS ── */
.result-hero{text-align:center}
.result-winner{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1}
.result-pct{font-size:15px;color:var(--muted);margin-top:4px}
.result-cards{display:flex;gap:10px;margin-top:14px}
.result-mc{flex:1;text-align:center;padding:14px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;transition:opacity .4s}
.result-mc .name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.result-mc .pct{font-size:24px;font-weight:700;margin-top:4px}
.result-mc .vts{font-size:11px;color:var(--muted);margin-top:2px}

/* ── REPLICA ── */
.replica-hero{text-align:center}
.replica-text{font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:8px;color:var(--gold);animation:pulse 1.1s ease-in-out infinite;line-height:1}
.replica-sub{font-size:12px;color:var(--muted);letter-spacing:3px;margin-top:8px}

/* ── FOOTER ── */
.footer{
  width:100%;text-align:center;padding:12px 16px 20px;
  font-size:10px;color:#222;letter-spacing:3px;
}
.footer .sj{color:rgba(212,160,23,.35)}

/* ── CONFETTI ── */
.confetti{position:fixed;top:-10px;font-size:20px;animation:fall linear forwards;pointer-events:none;z-index:99}
@keyframes fall{to{top:110vh;opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logos-row">
    <img src="img/Logo-SAN-JORGE.png" alt="San Jorge">
    <div class="div"></div>
    <img src="img/Logo- RAPSODIA.png" alt="Rapsodia">
  </div>
  <div class="brand-name">VOTO <span>SAN JORGE</span></div>
  <div class="phase-pill" id="phase-label">Conectando...</div>
</div>

<div class="main" id="main-content">
  <div class="msg-card">
    <h2>Esperando batalla...</h2>
    <p>Mantén esta página abierta. La votación aparecerá automáticamente.</p>
    <div class="msg-icon">🎤</div>
  </div>
</div>

<div class="footer">
  #RAPSODIAPERU &middot; @rapsodia.peru<br>
  <span class="sj">AUSPICIADO POR SAN JORGE</span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/config.js"></script>
<script>
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let hasVoted = {};
let currentRoundId = null;

function getVoterId() {
  let id = localStorage.getItem('rapsodia_voter_id');
  if (!id) { id = 'v_' + Math.random().toString(36).substr(2,12); localStorage.setItem('rapsodia_voter_id', id); }
  return id;
}
const VOTER_ID = getVoterId();

function vibrate() { if (navigator.vibrate) navigator.vibrate(30); }

function confetti() {
  const emojis = ['🎤','🔥','💥','⚡','🎵','👑','🏆'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    el.style.animationDelay = Math.random()*0.6+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4000);
  }
}

const content = document.getElementById('main-content');
const phaseEl = document.getElementById('phase-label');

db.ref('rapsodia_event/current').on('value', snap => {
  const data = snap.val();
  if (!data) return;
  currentRoundId = data.roundId;
  render(data);
});

function render(data) {
  const voted = hasVoted[data.roundId];
  const v1 = data.votes1||0, v2 = data.votes2||0;
  const total = v1+v2||1;
  const pct1 = Math.round(v1/total*100);
  const pct2 = Math.round(v2/total*100);
  const isTie = v1===v2;
  const w = v1>=v2?1:2;

  phaseEl.textContent = data.phase || 'En vivo';

  if (data.status === 'idle') {
    content.innerHTML = `
      <div class="msg-card" style="animation:fadeUp .4s ease">
        <h2>${data.mc1||'???'} VS ${data.mc2||'???'}</h2>
        <p>La votación abrirá en un momento.<br>Mantén la página abierta.</p>
        <div class="msg-icon">⚡</div>
      </div>`;
    return;
  }

  if (data.status === 'scan') {
    content.innerHTML = `
      <div class="msg-card" style="animation:fadeUp .4s ease">
        <h2>${data.mc1} VS ${data.mc2}</h2>
        <p>¡Prepárate para votar! La votación abrirá en segundos.</p>
        <div class="msg-icon">🎤</div>
      </div>`;
    return;
  }

  if (data.status === 'voting' || data.status === 'closed') {
    const isOpen = data.status==='voting' && (data.timeLeft||0) > 0;
    const urgent = (data.timeLeft||0) <= 10 && isOpen;

    content.innerHTML = `
      ${isOpen
        ? `<div class="timer-bar ${urgent?'urgent':''}">
             <div class="timer-num" style="color:${urgent?'var(--red)':'#fff'}">${data.timeLeft}</div>
             <div class="timer-lbl">${urgent?'⚠ ÚLTIMOS SEGUNDOS':'SEG RESTANTES'}</div>
           </div>`
        : data.status==='closed' && !voted
        ? `<div class="timer-bar"><div class="timer-lbl" style="font-size:13px">Votación cerrada</div></div>`
        : ''}
      <div class="battle-card ${voted===1?'voted-card':voted?'dimmed':!isOpen&&!voted?'disabled':''}"
           style="--sel-color:var(--red);--sel-rgb:226,75,74"
           onclick="vote(1)">
        <div class="mc-name r">${data.mc1}</div>
        <div class="mc-meta">${v1} votos${voted?' — '+pct1+'%':''}</div>
        ${voted===1?`<div class="check-badge" style="background:var(--red)">✓</div>`:''}
      </div>
      <div class="vs-row">VS</div>
      <div class="battle-card ${voted===2?'voted-card':voted?'dimmed':!isOpen&&!voted?'disabled':''}"
           style="--sel-color:var(--blue);--sel-rgb:55,138,221"
           onclick="vote(2)">
        <div class="mc-name b">${data.mc2}</div>
        <div class="mc-meta">${v2} votos${voted?' — '+pct2+'%':''}</div>
        ${voted===2?`<div class="check-badge" style="background:var(--blue)">✓</div>`:''}
      </div>
      <div class="bar-wrap">
        <div style="width:${pct1}%;background:var(--red)"></div>
        <div style="width:${pct2}%;background:var(--blue)"></div>
      </div>
      ${voted?'<div style="text-align:center;font-size:12px;color:var(--muted);letter-spacing:2px">Voto registrado ✓</div>':''}`;
    return;
  }

  if (data.status === 'results') {
    phaseEl.textContent = 'Resultado';
    if (!content.dataset.confettied) { confetti(); content.dataset.confettied = '1'; }

    if (isTie) {
      content.innerHTML = `
        <div class="msg-card" style="animation:fadeUp .5s ease">
          <div class="replica-hero">
            <div class="replica-text">RÉPLICA</div>
            <div class="replica-sub">EMPATE — SE REPITE LA BATALLA</div>
          </div>
        </div>
        <div class="result-cards">
          <div class="result-mc">
            <div class="name" style="color:var(--red)">${data.mc1}</div>
            <div class="pct">${pct1}%</div>
            <div class="vts">${v1} votos</div>
          </div>
          <div class="result-mc">
            <div class="name" style="color:var(--blue)">${data.mc2}</div>
            <div class="pct">${pct2}%</div>
            <div class="vts">${v2} votos</div>
          </div>
        </div>
        <div class="bar-wrap">
          <div style="width:50%;background:var(--red)"></div>
          <div style="width:50%;background:var(--blue)"></div>
        </div>`;
      return;
    }

    const wColor = w===1?'var(--red)':'var(--blue)';
    const wName  = w===1?data.mc1:data.mc2;
    content.innerHTML = `
      <div class="msg-card" style="animation:fadeUp .5s ease">
        <div class="result-hero">
          <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase">Favorito del público</div>
          <div class="result-winner" style="color:${wColor}">${wName}</div>
          <div class="result-pct">${Math.max(pct1,pct2)}% de los votos</div>
        </div>
      </div>
      <div class="result-cards">
        <div class="result-mc" style="opacity:${w===1?1:.3}">
          <div class="name" style="color:var(--red)">${data.mc1}</div>
          <div class="pct">${pct1}%</div>
          <div class="vts">${v1} votos</div>
        </div>
        <div class="result-mc" style="opacity:${w===2?1:.3}">
          <div class="name" style="color:var(--blue)">${data.mc2}</div>
          <div class="pct">${pct2}%</div>
          <div class="vts">${v2} votos</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div style="width:${pct1}%;background:var(--red);box-shadow:${w===1?'0 0 10px var(--red)':'none'}"></div>
        <div style="width:${pct2}%;background:var(--blue);box-shadow:${w===2?'0 0 10px var(--blue)':'none'}"></div>
      </div>`;
  }
}

function vote(mc) {
  if (!currentRoundId || hasVoted[currentRoundId]) return;
  vibrate();
  const voterRef = db.ref(`rapsodia_event/voters/${currentRoundId}/${VOTER_ID}`);
  voterRef.once('value', snap => {
    if (snap.exists()) return;
    voterRef.set(mc);
    hasVoted[currentRoundId] = mc;
    const field = mc===1?'votes1':'votes2';
    db.ref(`rapsodia_event/current/${field}`).transaction(v=>(v||0)+1);
    db.ref(`rapsodia_event/rounds/${currentRoundId}/${field}`).transaction(v=>(v||0)+1);
  });
}
</script>
</body>
</html>
