<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voto San Jorge</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--sj:#CC0000;--sj2:#E8192C;--gold:#D4A017;--bg:#080808;--card:#0f0f0f;--border:#1c1c1c;--muted:#444}
body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* BG */
.bg-top{position:fixed;top:0;left:0;right:0;height:40%;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(204,0,0,.14) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
.top-bar{
  width:100%;position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 20px 12px;
  background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%);
}
.logos-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logos-row .sj-img{height:36px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(232,25,44,.5))}
.logos-row .rsd-img{height:30px;object-fit:contain;opacity:.75}
.logos-row .sep{width:1px;height:28px;background:rgba(255,255,255,.1)}
.brand-name{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:5px;color:#fff}
.brand-name .red{color:var(--sj2)}
.phase-pill{
  margin-top:4px;padding:3px 16px;border-radius:20px;
  font-size:11px;letter-spacing:3px;font-weight:700;text-transform:uppercase;
  background:rgba(204,0,0,.12);border:1px solid rgba(204,0,0,.25);color:var(--sj2);
  display:inline-block;
}

/* MAIN */
.main{width:100%;max-width:430px;padding:14px 14px 24px;flex:1;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}

/* SJ LOGO CENTERED ON IDLE */
.sj-center-logo{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:24px 0;
}
.sj-center-logo img{height:100px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(232,25,44,.55));animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(232,25,44,.45))}50%{filter:drop-shadow(0 0 40px rgba(232,25,44,.8))}}

/* CARDS */
.msg-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:22px 18px;text-align:center;
}
.msg-card h2{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:3px}
.msg-card p{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5;font-family:'DM Sans',sans-serif}

/* TIMER */
.timer-bar{
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 18px;
}
.timer-n{font-family:'Anton',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;color:#fff}
.timer-lbl{font-size:12px;letter-spacing:3px;color:var(--muted);font-weight:700}
.timer-bar.urgent{background:rgba(204,0,0,.14);border-color:rgba(204,0,0,.35)}
.timer-bar.urgent .timer-n{color:var(--sj2);animation:pulse 1s infinite}

/* BATTLE CARDS */
.battle-card{
  position:relative;overflow:hidden;border-radius:16px;padding:18px 16px 18px 20px;
  background:var(--card);border:2px solid var(--border);
  cursor:pointer;transition:transform .1s,border-color .2s,box-shadow .2s;
  -webkit-user-select:none;user-select:none;
}
.battle-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--stripe);border-radius:2px 0 0 2px}
.battle-card:active:not(.disabled):not(.dimmed){transform:scale(.97)}
.battle-card.voted-r{border-color:var(--sj2);box-shadow:0 0 20px rgba(204,0,0,.2)}
.battle-card.voted-r::after{content:'';position:absolute;inset:0;background:var(--sj2);opacity:.06}
.battle-card.voted-b{border-color:rgba(255,255,255,.3);box-shadow:0 0 20px rgba(255,255,255,.07)}
.battle-card.voted-b::after{content:'';position:absolute;inset:0;background:#fff;opacity:.04}
.battle-card.dimmed{opacity:.25;pointer-events:none}
.battle-card.disabled{cursor:default;opacity:.4}

.mc-n{font-family:'Anton',sans-serif;font-size:44px;letter-spacing:3px;line-height:1}
.mc-n.r{color:var(--sj2)}
.mc-n.b{color:#fff}
.mc-meta{font-size:13px;color:var(--muted);margin-top:5px;letter-spacing:1px}
.check{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
}

.vs-sep{text-align:center;font-family:'Anton',sans-serif;font-size:14px;letter-spacing:6px;color:#1e1e1e;margin:-2px 0}

/* PROGRESS BAR */
.bar-wrap{height:7px;border-radius:4px;display:flex;overflow:hidden;background:#141414;gap:2px}
.bar-wrap div{transition:width .5s cubic-bezier(.4,0,.2,1)}

/* VOTED NOTE */
.voted-note{text-align:center;font-size:12px;color:var(--muted);letter-spacing:2px}

/* RESULTS */
.result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 18px;text-align:center}
.result-winner-name{font-family:'Anton',sans-serif;font-size:54px;letter-spacing:4px;color:var(--sj2);line-height:1;text-shadow:0 0 30px rgba(232,25,44,.4)}
.result-winner-pct{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:4px;color:rgba(255,255,255,.4);margin-top:4px}
.result-badge{display:inline-block;margin-top:10px;padding:4px 16px;border-radius:20px;font-size:12px;letter-spacing:3px;font-weight:700;color:var(--gold);border:1px solid rgba(212,160,23,.25);background:rgba(212,160,23,.08)}
.result-cols{display:flex;gap:8px}
.result-col{flex:1;padding:14px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;text-align:center;transition:opacity .4s}
.result-col .col-name{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:2px}
.result-col .col-pct{font-family:'Anton',sans-serif;font-size:26px;margin-top:4px}
.result-col .col-vts{font-size:12px;color:var(--muted);margin-top:2px}

/* REPLICA */
.replica-card{background:var(--card);border:1px solid rgba(204,0,0,.3);border-radius:18px;padding:22px 18px;text-align:center;box-shadow:0 0 40px rgba(204,0,0,.1)}
.replica-n{font-family:'Anton',sans-serif;font-size:60px;letter-spacing:8px;color:var(--sj2);line-height:1;animation:pulse 1.1s ease-in-out infinite;text-shadow:0 0 40px rgba(232,25,44,.5)}
.replica-sub{font-size:13px;letter-spacing:3px;color:var(--muted);margin-top:8px;font-weight:600}

/* FOOTER */
.footer{width:100%;text-align:center;padding:10px 16px 18px;font-size:10px;color:#1e1e1e;letter-spacing:3px;z-index:1}
.footer .sj{color:rgba(204,0,0,.3);font-weight:700}

/* CONFETTI */
.confetti{position:fixed;top:-10px;font-size:20px;animation:fall linear forwards;pointer-events:none;z-index:99}

/* KEYFRAMES */
@keyframes fall{to{top:110vh;opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg-top"></div>

<div class="top-bar">
  <div class="logos-row">
    <img class="sj-img" src="img/Logo-SAN-JORGE.png" alt="San Jorge">
    <div class="sep"></div>
    <img class="rsd-img" src="img/Logo- RAPSODIA.png" alt="Rapsodia">
  </div>
  <div class="brand-name">VOTO <span class="red">SAN JORGE</span></div>
  <div class="phase-pill" id="phase-label">Conectando...</div>
</div>

<div class="main" id="main-content">
  <div class="sj-center-logo">
    <img src="img/Logo-SAN-JORGE.png" alt="San Jorge">
  </div>
  <div class="msg-card">
    <h2>Esperando batalla...</h2>
    <p>Mantén esta página abierta. La votación aparecerá automáticamente.</p>
  </div>
</div>

<div class="footer">
  #RAPSODIAPERU · @rapsodia.peru<br>
  <span class="sj">AUSPICIADO POR SAN JORGE ®</span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/config.js"></script>
<script>
const app = firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();

let hasVoted = {};
let currentRoundId = null;
let currentData = null;

function getVoterId() {
  let id = localStorage.getItem('rapsodia_voter_id');
  if (!id) { id = 'v_' + Math.random().toString(36).substr(2,12); localStorage.setItem('rapsodia_voter_id', id); }
  return id;
}
const VOTER_ID = getVoterId();

function vibrate() { if (navigator.vibrate) navigator.vibrate(30); }

function confetti() {
  const emojis = ['🎤','🔥','💥','⚡','🎵','👑','🏆'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+'%';
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    el.style.animationDelay = Math.random()*0.6+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4000);
  }
}

const contentEl = document.getElementById('main-content');
const phaseEl   = document.getElementById('phase-label');

db.ref('rapsodia_event/current').on('value', snap => {
  const data = snap.val();
  currentData = data;
  if (!data) {
    phaseEl.textContent = 'En espera';
    contentEl.innerHTML = `
      <div class="sj-center-logo" style="animation:fadeUp .4s ease">
        <img src="img/Logo-SAN-JORGE.png" alt="San Jorge">
      </div>
      <div class="msg-card" style="animation:fadeUp .5s ease">
        <h2>Esperando batalla...</h2>
        <p>Mantén esta página abierta. La votación aparecerá automáticamente.</p>
      </div>`;
    return;
  }
  currentRoundId = data.roundId;
  render(data);
});

function render(data) {
  const voted = hasVoted[data.roundId];
  const v1 = data.votes1||0, v2 = data.votes2||0;
  const total = v1+v2||1;
  const pct1 = Math.round(v1/total*100);
  const pct2 = Math.round(v2/total*100);
  const isTie = v1===v2;
  const w = v1>=v2?1:2;

  phaseEl.textContent = data.phase || 'En vivo';

  /* IDLE */
  if (data.status === 'idle') {
    contentEl.innerHTML = `
      <div class="sj-center-logo" style="animation:fadeUp .4s ease">
        <img src="img/Logo-SAN-JORGE.png" alt="San Jorge">
      </div>
      <div class="msg-card" style="animation:fadeUp .5s ease">
        <h2>${data.mc1||'???'} VS ${data.mc2||'???'}</h2>
        <p>La votación abrirá en un momento. Mantén la página abierta.</p>
      </div>`;
    return;
  }

  /* SCAN */
  if (data.status === 'scan') {
    contentEl.innerHTML = `
      <div class="sj-center-logo" style="animation:fadeUp .4s ease">
        <img src="img/Logo-SAN-JORGE.png" alt="San Jorge">
      </div>
      <div class="msg-card" style="animation:fadeUp .5s ease">
        <h2>${data.mc1} VS ${data.mc2}</h2>
        <p>¡Prepárate para votar! La votación abrirá en segundos.</p>
      </div>`;
    return;
  }

  /* VOTING / CLOSED */
  if (data.status === 'voting' || data.status === 'closed') {
    const isOpen = data.status==='voting' && (data.timeLeft||0) > 0;
    const urgent = (data.timeLeft||0) <= 10 && isOpen;

    contentEl.innerHTML = `
      ${isOpen
        ? `<div class="timer-bar ${urgent?'urgent':''}" style="animation:fadeUp .3s ease">
             <div class="timer-n" style="color:${urgent?'var(--sj2)':'#fff'}">${data.timeLeft}</div>
             <div class="timer-lbl">${urgent?'⚠ ÚLTIMOS SEGUNDOS':'SEG RESTANTES'}</div>
           </div>`
        : data.status==='closed'&&!voted
        ? `<div class="timer-bar" style="animation:fadeUp .3s ease">
             <div class="timer-lbl" style="font-size:14px">Votación cerrada</div>
           </div>`
        : ''}
      <div class="battle-card ${voted===1?'voted-r':voted?'dimmed':!isOpen&&!voted?'disabled':''}"
           style="--stripe:var(--sj2);animation:fadeUp .4s ease" onclick="vote(1)">
        <div class="mc-n r">${data.mc1}</div>
        <div class="mc-meta">${v1} votos${voted?' · '+pct1+'%':''}</div>
        ${voted===1?`<div class="check" style="background:var(--sj2)">✓</div>`:''}
      </div>
      <div class="vs-sep">VS</div>
      <div class="battle-card ${voted===2?'voted-b':voted?'dimmed':!isOpen&&!voted?'disabled':''}"
           style="--stripe:rgba(255,255,255,.25);animation:fadeUp .5s ease" onclick="vote(2)">
        <div class="mc-n b">${data.mc2}</div>
        <div class="mc-meta">${v2} votos${voted?' · '+pct2+'%':''}</div>
        ${voted===2?`<div class="check" style="background:rgba(255,255,255,.2)">✓</div>`:''}
      </div>
      <div class="bar-wrap">
        <div style="width:${pct1}%;background:var(--sj2)"></div>
        <div style="width:${pct2}%;background:rgba(255,255,255,.3)"></div>
      </div>
      ${voted?`<div class="voted-note">Voto registrado ✓</div>`:''}`;
    return;
  }

  /* RESULTS */
  if (data.status === 'results') {
    phaseEl.textContent = 'Resultado';
    if (!contentEl.dataset.confettied) { confetti(); contentEl.dataset.confettied='1'; }

    if (isTie) {
      contentEl.innerHTML = `
        <div class="replica-card" style="animation:fadeUp .5s ease">
          <div class="replica-n">RÉPLICA</div>
          <div class="replica-sub">EMPATE — SE REPITE LA BATALLA</div>
        </div>
        <div class="result-cols">
          <div class="result-col">
            <div class="col-name" style="color:var(--sj2)">${data.mc1}</div>
            <div class="col-pct">${pct1}%</div>
            <div class="col-vts">${v1} votos</div>
          </div>
          <div class="result-col">
            <div class="col-name" style="color:#fff">${data.mc2}</div>
            <div class="col-pct">${pct2}%</div>
            <div class="col-vts">${v2} votos</div>
          </div>
        </div>
        <div class="bar-wrap">
          <div style="width:50%;background:var(--sj2)"></div>
          <div style="width:50%;background:rgba(255,255,255,.3)"></div>
        </div>`;
      return;
    }

    const wColor = w===1?'var(--sj2)':'#fff';
    const wName  = w===1?data.mc1:data.mc2;
    contentEl.innerHTML = `
      <div class="result-card" style="animation:fadeUp .5s ease">
        <div style="font-size:12px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Favorito del público</div>
        <div class="result-winner-name" style="color:${wColor}">${wName}</div>
        <div class="result-winner-pct">${Math.max(pct1,pct2)}% de los votos</div>
        <div class="result-badge">⚡ GANADOR DE LA VOTACIÓN</div>
      </div>
      <div class="result-cols">
        <div class="result-col" style="opacity:${w===1?1:.25}">
          <div class="col-name" style="color:var(--sj2)">${data.mc1}</div>
          <div class="col-pct">${pct1}%</div>
          <div class="col-vts">${v1} votos</div>
        </div>
        <div class="result-col" style="opacity:${w===2?1:.25}">
          <div class="col-name" style="color:#fff">${data.mc2}</div>
          <div class="col-pct">${pct2}%</div>
          <div class="col-vts">${v2} votos</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div style="width:${pct1}%;background:var(--sj2);box-shadow:${w===1?'0 0 10px var(--sj2)':'none'}"></div>
        <div style="width:${pct2}%;background:rgba(255,255,255,.3)"></div>
      </div>`;
  }
}

function vote(mc) {
  if (!currentRoundId || hasVoted[currentRoundId]) return;
  // Verificar que la votación sigue abierta en Firebase
  if (!currentData || currentData.status !== 'voting' || (currentData.timeLeft||0) <= 0) return;
  vibrate();
  const voterRef = db.ref(`rapsodia_event/voters/${currentRoundId}/${VOTER_ID}`);
  voterRef.once('value', snap => {
    if (snap.exists()) return;
    voterRef.set(mc);
    hasVoted[currentRoundId] = mc;
    const field = mc===1?'votes1':'votes2';
    db.ref(`rapsodia_event/current/${field}`).transaction(v=>(v||0)+1);
    db.ref(`rapsodia_event/rounds/${currentRoundId}/${field}`).transaction(v=>(v||0)+1);
  });
}
</script>
</body>
</html>
